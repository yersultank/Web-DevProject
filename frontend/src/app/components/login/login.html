<div class="login-container">
    <div class="login-card">
        <div class="logo-icon">🏠</div>
        
        <h2>{{ isLoginMode ? 'AssetTrack' : 'Join AssetTrack' }}</h2>
        <p>{{ isLoginMode ? 'Please enter your credentials' : 'Create a new staff account' }}</p>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <input type="text" [(ngModel)]="loginData.username" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="password" [(ngModel)]="loginData.password" name="password" placeholder="Password" required>
            </div>

            <div class="form-group row">
                <label class="checkbox-label">
                    <input type="checkbox" [(ngModel)]="loginData.remember" name="remember">
                    <span>Remember this device</span>
                </label>
            </div>

            <button type="submit" [disabled]="loading" class="btn-primary">
                {{ loading ? 'Processing...' : (isLoginMode ? 'Sign In' : 'Create Account') }}
            </button>
        </form>

        <div class="toggle-mode">
            <p>
                {{ isLoginMode ? "Don't have an account?" : "Already have an account?" }}
                <span class="toggle-link" (click)="toggleMode()">
                    {{ isLoginMode ? 'Sign Up' : 'Login' }}
                </span>
            </p>
        </div>

        @if (errorMessage) {
            <div class="error-message">
                {{ errorMessage }}
            </div>
        }
    </div>
</div>
